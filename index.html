<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Site</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    cursor: none;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
    overflow: hidden;
  }

  /* video de fundo - mantem proporcao original, sem esticar/cortar */
  .bg-video {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    transform: translate(-50%, -50%);
    object-fit: contain;
    z-index: 1;
  }

  /* container da logo */
  .logo-wrap {
    position: absolute;
    top: 6%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    cursor: none;
  }

  .logo-wrap img {
    display: block;
    width: clamp(320px, 38vw, 520px);
    height: auto;
    filter: drop-shadow(0 0 0px rgba(255,255,255,0));
    transition: filter 0.4s ease-out, transform 0.3s ease-out;
    -webkit-user-drag: none;
    user-select: none;
  }

  .logo-wrap:hover img {
    transform: scale(1.04);
    filter:
      drop-shadow(0 0 6px rgba(255,255,255,0.9))
      drop-shadow(0 0 16px rgba(255,255,255,0.75))
      drop-shadow(0 0 32px rgba(255,255,255,0.55))
      drop-shadow(0 0 60px rgba(255,255,255,0.35));
  }

  /* cursor customizado (segue o mouse via JS) */
  #customCursor {
    position: fixed;
    top: -100px;
    left: -100px;
    width: 64px;
    height: 64px;
    pointer-events: none;
    z-index: 9999;
  }

  /* canvas das faiscas roxas, full screen, acima de tudo, sem capturar clique */
  #sparks {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>

<div class="stage" id="stage">

  <video class="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="https://v1.pinimg.com/videos/iht/expMp4/b0/93/31/b09331b52595e2bb1c581454bed53023_720w.mp4" type="video/mp4">
  </video>

  <div class="logo-wrap" id="logoWrap">
    <img src="https://xatimg.com/image/8IRbhfvuTgzy.png" alt="Logo" id="logoImg" draggable="false">
  </div>

  <canvas id="sparks"></canvas>

</div>

<script>
  // ----- Setup canvas de faiscas -----
  const canvas = document.getElementById('sparks');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // paleta de roxo para as faiscas (variações pra dar profundidade de "fogo")
  const purpleColors = [
    '178, 102, 255',  // roxo claro/violeta
    '147, 51, 234',   // roxo médio
    '124, 58, 237',   // roxo-violeta
    '199, 125, 255',  // lilás brilhante
    '90, 30, 160'     // roxo escuro
  ];

  class Spark {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 7 + 3;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 2.5; // impulso pra cima, como fogo
      this.gravity = 0.025;
      this.drag = 0.99;
      this.life = 1;
      this.decay = Math.random() * 0.006 + 0.004;
      this.size = Math.random() * 3 + 1.5;
      this.color = purpleColors[Math.floor(Math.random() * purpleColors.length)];
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.vx *= this.drag;
      this.vy *= this.drag;
      this.life -= this.decay;
    }

    draw() {
      if (this.life <= 0) return;
      ctx.save();
      ctx.globalAlpha = Math.max(this.life, 0);
      ctx.shadowBlur = 14;
      ctx.shadowColor = `rgba(${this.color}, 1)`;
      ctx.fillStyle = `rgba(${this.color}, ${this.life})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * Math.max(this.life, 0.2), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  let sparks = [];
  let isHoveringLogo = false;
  const logoWrap = document.getElementById('logoWrap');

  function getLogoEmitPoint() {
    const rect = logoWrap.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    // ponto aleatorio ao longo do contorno (perimetro) da logo, relativo ao stage
    const w = rect.width;
    const h = rect.height;
    const perim = 2 * (w + h);
    let d = Math.random() * perim;
    let lx, ly;
    if (d < w) { lx = d; ly = 0; }
    else if (d < w + h) { lx = w; ly = d - w; }
    else if (d < 2 * w + h) { lx = w - (d - w - h); ly = h; }
    else { lx = 0; ly = h - (d - 2 * w - h); }

    return {
      x: rect.left - stageRect.left + lx,
      y: rect.top - stageRect.top + ly
    };
  }

  logoWrap.addEventListener('mouseenter', () => { isHoveringLogo = true; });
  logoWrap.addEventListener('mouseleave', () => { isHoveringLogo = false; });

  function emitSparks() {
    if (!isHoveringLogo) return;
    const count = 6;
    for (let i = 0; i < count; i++) {
      const p = getLogoEmitPoint();
      sparks.push(new Spark(p.x, p.y));
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    emitSparks();

    for (let i = sparks.length - 1; i >= 0; i--) {
      sparks[i].update();
      sparks[i].draw();
      if (sparks[i].life <= 0) {
        sparks.splice(i, 1);
      }
    }

    // limite de seguranca pra performance
    if (sparks.length > 700) {
      sparks.splice(0, sparks.length - 700);
    }

    requestAnimationFrame(animate);
  }
  animate();

  // ----- Cursor customizado seguindo o mouse -----
  const customCursor = document.getElementById('customCursor');
  const CURSOR_OFFSET = 16; // compensa o padding adicionado na geracao do gif (mantem a ponta no hotspot real)

  function moveCursor(clientX, clientY) {
    customCursor.style.left = (clientX - CURSOR_OFFSET) + 'px';
    customCursor.style.top = (clientY - CURSOR_OFFSET) + 'px';
  }

  window.addEventListener('mousemove', (e) => {
    moveCursor(e.clientX, e.clientY);
  });

  document.addEventListener('mouseleave', () => {
    customCursor.style.left = '-100px';
    customCursor.style.top = '-100px';
  });

  // suporte touch basico (mobile) - aciona faiscas se o toque estiver sobre a logo
  stage.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    if (!touch) return;
    const rect = logoWrap.getBoundingClientRect();
    isHoveringLogo = (
      touch.clientX >= rect.left && touch.clientX <= rect.right &&
      touch.clientY >= rect.top && touch.clientY <= rect.bottom
    );
  }, { passive: true });
</script>
