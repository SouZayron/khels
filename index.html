<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Site</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    cursor: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyOCIgaGVpZ2h0PSIyOCIgdmlld0JveD0iMCAwIDI4IDI4Ij4KPHBhdGggZD0iTTIgMSBMMiAyMiBMNy41IDE3LjUgTDExIDI1IEwxNC41IDIzLjUgTDExIDE2IEwxOSAxNiBaIiBmaWxsPSJibGFjayIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIxLjIiIHN0cm9rZS1saW5lam9pbj0icm91bmQiLz4KPC9zdmc+') 2 1, auto;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
    overflow: hidden;
  }

  /* fundo gif - cobre a tela inteira */
  .bg-gif {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: 1;
    pointer-events: none;
  }

  /* container da logo - lado direito da tela, com parallax via JS */
  .logo-wrap {
    position: fixed;
    top: 50%;
    right: -2%;
    transform: translateY(-50%);
    z-index: 5;
    will-change: transform;
    height: 45.5vh;
    display: flex;
    align-items: center;
  }

  .logo-wrap img {
    display: block;
    height: 100%;
    width: auto;
    max-width: none;
    -webkit-user-drag: none;
    user-select: none;
  }
</style>
</head>
<body>

<img class="bg-gif" src="https://wallpapers-clan.com/wp-content/uploads/2025/01/naruto-uzumaki-four-tails-rage-mode-gif-desktop-wallpaper-preview.gif" alt="">

<div class="stage" id="stage">

  <div class="logo-wrap" id="logoWrap">
    <img src="https://xatimg.com/image/2cKlhpG778v6.png" alt="Logo" draggable="false">
  </div>

</div>

<script>
  const stage = document.getElementById('stage');
  const logoWrap = document.getElementById('logoWrap');

  // intensidade do parallax (px de deslocamento maximo)
  const MAX_OFFSET_X = 35;
  const MAX_OFFSET_Y = 25;

  let targetX = 0, targetY = 0;
  let currentX = 0, currentY = 0;

  function handleMove(clientX, clientY) {
    const w = window.innerWidth;
    const h = window.innerHeight;
    // normaliza posicao do mouse de -1 a 1
    const normX = (clientX / w) * 2 - 1;
    const normY = (clientY / h) * 2 - 1;
    // movimento contrario ao mouse
    targetX = -normX * MAX_OFFSET_X;
    targetY = -normY * MAX_OFFSET_Y;
  }

  window.addEventListener('mousemove', (e) => {
    handleMove(e.clientX, e.clientY);
  });

  window.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    if (touch) handleMove(touch.clientX, touch.clientY);
  }, { passive: true });

  function animateParallax() {
    // suaviza o movimento (easing)
    currentX += (targetX - currentX) * 0.08;
    currentY += (targetY - currentY) * 0.08;

    logoWrap.style.transform =
      `translateY(-50%) translate(${currentX}px, ${currentY}px)`;

    requestAnimationFrame(animateParallax);
  }
  animateParallax();
</script>

</body>
</html>
